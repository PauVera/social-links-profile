<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <h1 class="sr-only">Social Links Profile</h1>

      <article class="socials-card flex-col">
        <header class="socials-card__persona flex-col">
          <img
            src="./assets/images/avatar-jessica.jpeg"
            alt="Portrait of Jessica Randall"
            class="socials-card__avatar"
          />
          <div class="socials-card__persona-info flex-col">
            <h2 class="socials-card__name">Jessica Randall</h2>
            <p class="socials-card__location">London, United Kingdom</p>
          </div>
          <p class="socials-card__bio">
            "Front-end developer and avid reader."
          </p>
        </header>
        <ul class="socials-card__list flex-col">
          <li class="socials-card__list-item">
            <a href="" class="socials-card__list-link">GitHub</a>
          </li>

          <li class="socials-card__list-item">
            <a href="" class="socials-card__list-link">Frontend Mentor</a>
          </li>

          <li class="socials-card__list-item">
            <a href="" class="socials-card__list-link">LinkedIn</a>
          </li>

          <li class="socials-card__list-item">
            <a href="" class="socials-card__list-link">Twitter</a>
          </li>

          <li class="socials-card__list-item">
            <a href="" class="socials-card__list-link">Instagram</a>
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
